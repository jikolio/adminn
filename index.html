<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - فلل الفخامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #0a0a0a; color: white; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #D4AF37; text-align: center; margin-bottom: 20px; }
        
        .stats { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 15px 25px; border-radius: 15px; text-align: center; min-width: 120px; border: 1px solid rgba(212,175,55,0.3); }
        .stat-card .num { font-size: 28px; font-weight: bold; color: #D4AF37; }
        .stat-card .label { font-size: 12px; color: #888; margin-top: 5px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { padding: 10px 18px; background: rgba(255,255,255,0.1); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .tab-btn.active { background: #D4AF37; color: black; }
        .tab-btn:hover { background: rgba(212,175,55,0.5); }
        .tab-content { display: none; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-top: 10px; }
        .tab-content.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 6px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 13px; }
        input { padding: 6px 8px; border-radius: 5px; background: rgba(255,255,255,0.1); border: 1px solid #D4AF37; color: white; text-align: center; width: 80px; }
        .location-input { width: 180px; }
        .location-name-input { width: 120px; }
        
        button { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 3px; font-size: 13px; transition: 0.2s; }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        .btn-save { background: #22c55e; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-add { background: #D4AF37; color: black; }
        .btn-book { background: #3b82f6; color: white; }
        .btn-cancel { background: #ef4444; color: white; }
        .btn-reset { background: #6b7280; color: white; }
        .btn-apply { background: #3b82f6; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #D4AF37; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.1); border: 1px solid #D4AF37; color: white; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 150px; }
        
        .image-preview-area { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .image-preview { width: 80px; height: 80px; border-radius: 8px; overflow: hidden; border: 2px solid #D4AF37; position: relative; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .image-preview .remove-img { position: absolute; top: -8px; right: -8px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; }
        .image-upload-btn { background: rgba(212,175,55,0.2); border: 2px dashed #D4AF37; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; margin-top: 10px; }
        
        .hero-image-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 8px; flex-wrap: wrap; }
        .hero-image-preview { width: 50px; height: 40px; object-fit: cover; border-radius: 5px; }
        .hero-upload-area { background: rgba(212,175,55,0.1); border: 2px dashed #D4AF37; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; margin-bottom: 15px; }
        
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .speed-control-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 8px; }
        .phone-item { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
        .phone-item input { flex: 1; padding: 8px; border-radius: 5px; background: rgba(255,255,255,0.1); border: 1px solid #D4AF37; color: white; }
        
        .booking-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .toggle-switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .3s; border-radius: 26px; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        .toggle-switch input:checked + .toggle-slider { background-color: #D4AF37; }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(24px); }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #D4AF37; color: black; padding: 10px 20px; border-radius: 25px; display: none; z-index: 9999; font-weight: bold; }
        .toast.show { display: block; }
        
        @media (max-width: 768px) {
            th, td { font-size: 11px; padding: 6px; }
            input { width: 55px; }
            .location-input { width: 100px; }
            .tab-btn { padding: 6px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-crown"></i> لوحة تحكم فلل الفخامة</h1>
    
    <div class="stats">
        <div class="stat-card"><div class="num" id="totalVillas">0</div><div class="label">إجمالي الفلل</div></div>
        <div class="stat-card"><div class="num" id="totalBookings">0</div><div class="label">الحجوزات</div></div>
        <div class="stat-card"><div class="num" id="availableCount">0</div><div class="label">متاحة</div></div>
        <div class="stat-card"><div class="num" id="bookedCount">0</div><div class="label">محجوزة</div></div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" data-tab="villas">🏠 إدارة الفلل</button>
        <button class="tab-btn" data-tab="add">➕ إضافة فيلا</button>
        <button class="tab-btn" data-tab="appearance">🎨 تخصيص المظهر</button>
        <button class="tab-btn" data-tab="images">🖼️ الخلفيات</button>
        <button class="tab-btn" data-tab="villaImages">⚡ سرعة الصور</button>
        <button class="tab-btn" data-tab="texts">✏️ النصوص</button>
        <button class="tab-btn" data-tab="phones">📞 أرقام الهاتف</button>
        <button class="tab-btn" data-tab="settings">⚙️ الإعدادات</button>
        <button class="tab-btn" data-tab="bookings">📋 الحجوزات</button>
    </div>
    
    <!-- 1. تبويب إدارة الفلل -->
    <div id="villasTab" class="tab-content active">
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>الفيلا</th><th>رابط الموقع</th><th>اسم الموقع</th><th>السعر</th><th>غرف</th><th>حمامات</th><th>ضيوف</th><th>الحالة</th><th>حجز/إلغاء</th><th>إظهار</th><th>حذف</th></tr></thead>
                <tbody id="villasList"></tbody>
            </table>
        </div>
        <button class="btn-save" id="saveVillasBtn"><i class="fas fa-save"></i> حفظ التغييرات</button>
    </div>
    
    <!-- 2. تبويب إضافة فيلا -->
    <div id="addTab" class="tab-content">
        <div class="form-row">
            <div class="form-group"><label>اسم الفيلا *</label><input type="text" id="newNumber" placeholder="مثال: فيلا 7"></div>
            <div class="form-group"><label>اسم الموقع</label><input type="text" id="newLocationName" placeholder="زاويتا - دهوك"></div>
            <div class="form-group"><label>رابط الموقع</label><input type="text" id="newLocation" placeholder="رابط خرائط جوجل"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>السعر</label><input type="number" id="newPrice" placeholder="200000"></div>
            <div class="form-group"><label>الغرف</label><input type="number" id="newBedrooms" value="3"></div>
            <div class="form-group"><label>الحمامات</label><input type="number" id="newBathrooms" value="2"></div>
            <div class="form-group"><label>الضيوف</label><input type="number" id="newGuests" value="6"></div>
        </div>
        <div class="image-upload-btn" onclick="document.getElementById('imageUpload').click()"><i class="fas fa-cloud-upload-alt"></i> 📸 إضافة صور</div>
        <input type="file" id="imageUpload" multiple accept="image/*" style="display:none" onchange="handleImageUpload(event)">
        <div class="image-preview-area" id="imagePreview"></div>
        <button class="btn-add" id="addVillaBtn"><i class="fas fa-plus"></i> إضافة فيلا</button>
        <button class="btn-cancel" id="clearAddFormBtn"><i class="fas fa-eraser"></i> مسح الحقول</button>
    </div>
    
    <!-- 3. تبويب تخصيص المظهر -->
    <div id="appearanceTab" class="tab-content">
        <div class="settings-grid">
            <div class="form-group"><label>اللون الذهبي</label><input type="color" id="primaryColor" value="#D4AF37"></div>
            <div class="form-group"><label>لون خلفية الفلل</label><input type="color" id="bgColor" value="#f5f5f7"></div>
        </div>
        <div class="settings-grid">
            <div class="form-group"><label>عرض البطاقة: <span id="gridWidthVal">320</span>px</label><input type="range" id="gridWidth" min="280" max="450" value="320" oninput="document.getElementById('gridWidthVal').innerText=this.value"></div>
            <div class="form-group"><label>ارتفاع الصورة: <span id="imageHeightVal">240</span>px</label><input type="range" id="imageHeight" min="180" max="350" value="240" oninput="document.getElementById('imageHeightVal').innerText=this.value"></div>
            <div class="form-group"><label>التباعد: <span id="gridGapVal">30</span>px</label><input type="range" id="gridGap" min="15" max="50" value="30" oninput="document.getElementById('gridGapVal').innerText=this.value"></div>
        </div>
        <div class="form-group"><label>ترتيب الفلل</label>
            <select id="sortOrder">
                <option value="default">الترتيب الافتراضي</option>
                <option value="priceAsc">السعر: من الأقل للأعلى</option>
                <option value="priceDesc">السعر: من الأعلى للأقل</option>
            </select>
        </div>
        <div class="settings-grid">
            <div class="form-group"><label>الشفافية (%)</label><input type="range" id="overlayOpacity" min="0" max="100" value="50"></div>
            <div class="form-group"><label>لون التغطية</label><input type="color" id="overlayColor" value="#000000"></div>
        </div>
        <button class="btn-save" id="saveAppearanceBtn"><i class="fas fa-save"></i> حفظ الإعدادات</button>
        <button class="btn-reset" id="resetAppearanceBtn"><i class="fas fa-undo-alt"></i> استرجاع الافتراضي</button>
    </div>
    
    <!-- 4. تبويب الخلفيات -->
    <div id="imagesTab" class="tab-content">
        <div class="hero-upload-area" onclick="document.getElementById('heroImageUpload').click()"><i class="fas fa-cloud-upload-alt"></i> 📸 إضافة صور خلفية</div>
        <input type="file" id="heroImageUpload" multiple accept="image/*" style="display:none" onchange="handleHeroImageUpload(event)">
        <div style="display:flex; gap:10px; margin:15px 0;">
            <input type="text" id="heroImageUrl" placeholder="أو أدخل رابط الصورة" style="flex:1; padding:10px; border-radius:8px; background:rgba(255,255,255,0.1); border:1px solid #D4AF37; color:white;">
            <button class="btn-add" id="addHeroImageBtn">إضافة</button>
        </div>
        <div id="heroImagesList"></div>
        <div class="settings-grid">
            <div class="form-group"><label>سرعة تبديل الصور: <span id="heroSpeedVal">6</span> ثانية</label><input type="range" id="heroSlideshowSpeed" min="2" max="15" value="6" oninput="document.getElementById('heroSpeedVal').innerText=this.value"></div>
            <div class="form-group"><label>نوع التبديل</label><select id="slideshowMode"><option value="sequential">تسلسلي</option><option value="random">عشوائي</option></select></div>
        </div>
        <button class="btn-apply" id="restartSlideshowBtn"><i class="fas fa-play"></i> إعادة تشغيل السلايدر</button>
        <button class="btn-reset" id="resetHeroImagesBtn"><i class="fas fa-undo-alt"></i> استرجاع الصور الافتراضية</button>
    </div>
    
    <!-- 5. تبويب سرعة الصور -->
    <div id="villaImagesTab" class="tab-content">
        <div id="speedsList"></div>
        <div class="settings-grid">
            <div class="form-group"><label>الوضع العام</label>
                <select id="globalSpeedMode">
                    <option value="individual">كل فيلا بسرعة مستقلة</option>
                    <option value="uniform">جميع الفلل بنفس السرعة</option>
                    <option value="alternating">تناوب (فردي/زوجي)</option>
                </select>
            </div>
            <div class="form-group" id="uniformSpeedGroup" style="display:none;">
                <label>السرعة الموحدة: <span id="uniformSpeedVal">4</span> ثانية</label>
                <input type="range" id="uniformSpeed" min="2" max="8" step="0.5" value="4" oninput="document.getElementById('uniformSpeedVal').innerText=this.value">
            </div>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn-apply" id="applySpeedBtn">تطبيق الإعدادات</button>
            <button class="btn-book" id="restartIntervalBtn">▶️ إعادة تشغيل التبديل</button>
            <button class="btn-cancel" id="stopIntervalBtn">⏸️ إيقاف التبديل</button>
            <button class="btn-warning" id="randomizeImagesBtn">🎲 تبديل عشوائي</button>
        </div>
        <div class="villa-settings-card" style="background:rgba(255,255,255,0.03); padding:15px; border-radius:10px; margin-top:15px;">
            <h4 style="color:#D4AF37;"><i class="fas fa-info-circle"></i> معلومات عن الفلل</h4>
            <div id="villaImagesInfo" style="font-size:14px; margin-top:10px;"></div>
        </div>
        <button class="btn-save" id="saveSpeedSettingsBtn"><i class="fas fa-save"></i> حفظ الإعدادات</button>
        <button class="btn-reset" id="resetSpeedSettingsBtn"><i class="fas fa-undo-alt"></i> استرجاع الإعدادات</button>
    </div>
    
    <!-- 6. تبويب النصوص -->
    <div id="textsTab" class="tab-content">
        <div class="settings-grid">
            <div class="form-group"><label>عنوان الموقع</label><input type="text" id="siteTitle" value="فلل الفخامة"></div>
            <div class="form-group"><label>وصف الموقع</label><input type="text" id="siteDesc" value="استمتع بتجربة إقامة فاخرة مع إطلالات خلابة"></div>
            <div class="form-group"><label>عنوان قسم الفلل</label><input type="text" id="sectionTitle" value="فللنا الفاخرة"></div>
            <div class="form-group"><label>وصف قسم الفلل</label><input type="text" id="sectionSubtitle" value="اختر الفيلا المثالية لإقامتك"></div>
            <div class="form-group"><label>نص زر واتساب</label><input type="text" id="whatsappBtnText" value="استفسار واتساب"></div>
            <div class="form-group"><label>نص زر الموقع</label><input type="text" id="locationBtnText" value="الموقع"></div>
            <div class="form-group"><label>نص الفوتر</label><input type="text" id="footerText" value="جميع الحقوق محفوظة © 2026 فلل الفخامة"></div>
            <div class="form-group"><label>نص موقع الفوتر</label><input type="text" id="footerLocationText" value="إقليم كردستان العراق - دهوك"></div>
            <div class="form-group"><label>نص زر فتح الموقع</label><input type="text" id="footerLocationBtnText" value="فتح الموقع"></div>
            <div class="form-group"><label>رابط الموقع</label><input type="text" id="footerLocationLink" value="https://www.google.com/maps/search/?api=1&query=37.1333,43.6167"></div>
        </div>
        <button class="btn-save" id="saveTextsBtn"><i class="fas fa-save"></i> حفظ النصوص</button>
        <button class="btn-reset" id="resetTextsBtn"><i class="fas fa-undo-alt"></i> استرجاع النصوص الافتراضية</button>
    </div>
    
    <!-- 7. تبويب أرقام الهاتف -->
    <div id="phonesTab" class="tab-content">
        <div id="phonesList"></div>
        <button class="btn-add" id="addPhoneBtn"><i class="fas fa-plus"></i> إضافة رقم جديد</button>
        <div class="form-group" style="margin-top:15px;"><label>رقم واتساب الرئيسي</label><input type="text" id="whatsappNumber" value="9647503124874"></div>
        <button class="btn-save" id="savePhonesBtn"><i class="fas fa-save"></i> حفظ الأرقام</button>
        <button class="btn-reset" id="resetPhonesBtn"><i class="fas fa-undo-alt"></i> استرجاع الأرقام الافتراضية</button>
    </div>
    
    <!-- 8. تبويب الإعدادات -->
    <div id="settingsTab" class="tab-content">
        <div class="settings-grid">
            <div class="form-group"><label>سرعة عرض الخلفيات (ثانية)</label><input type="number" id="generalHeroSpeed" min="2" max="15" value="6"></div>
            <div class="form-group"><label>نوع تبديل الخلفيات</label>
                <select id="generalSlideshowMode">
                    <option value="sequential">تسلسلي</option>
                    <option value="random">عشوائي</option>
                </select>
            </div>
        </div>
        <button class="btn-save" id="saveGeneralSettingsBtn"><i class="fas fa-save"></i> حفظ الإعدادات</button>
        <button class="btn-reset" id="resetGeneralSettingsBtn"><i class="fas fa-undo-alt"></i> استرجاع الإعدادات</button>
    </div>
    
    <!-- 9. تبويب الحجوزات -->
    <div id="bookingsTab" class="tab-content">
        <div id="bookingsList"></div>
        <button class="btn-danger" id="clearBookingsBtn"><i class="fas fa-trash-alt"></i> حذف جميع الحجوزات</button>
    </div>
</div>

if (typeof firebase !== 'undefined') {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    console.log("✅ Firebase ready");

// ==================== Load Data ====================
async function loadData() {
    if (!db) {
        properties = JSON.parse(JSON.stringify(defaultProperties));
        bookings = [];
        heroImages = [...defaultHeroImages];
        renderAll();
        return;
    }
    
    try {
        const propsSnap = await db.collection('properties').get();
        if (!propsSnap.empty) {
            properties = [];
            propsSnap.forEach(doc => properties.push(doc.data()));
        } else {
            properties = JSON.parse(JSON.stringify(defaultProperties));
            await saveProperties();
        }
        
        const bookingsSnap = await db.collection('settings').doc('bookings').get();
        bookings = (bookingsSnap.exists && bookingsSnap.data().bookings) ? bookingsSnap.data().bookings : [];
        
        const heroSnap = await db.collection('settings').doc('heroImages').get();
        heroImages = (heroSnap.exists && heroSnap.data().images) ? heroSnap.data().images : [...defaultHeroImages];
        
        const phonesSnap = await db.collection('settings').doc('phones').get();
        if (phonesSnap.exists) {
            if (phonesSnap.data().phoneNumbers) phoneNumbers = phonesSnap.data().phoneNumbers;
            if (phonesSnap.data().whatsappMainNumber) whatsappMain = phonesSnap.data().whatsappMainNumber;
        }
        
        renderAll();
    } catch(e) { console.error(e); }
}

// ==================== Save Functions ====================
async function saveProperties() {
    if (!db) return;
    for (const p of properties) await db.collection('properties').doc(p.id.toString()).set(p);
}

async function saveBookings() {
    if (!db) return;
    await db.collection('settings').doc('bookings').set({ bookings });
}

async function saveHeroImages() {
    if (!db) return;
    await db.collection('settings').doc('heroImages').set({ images: heroImages });
}

async function savePhones() {
    if (!db) return;
    await db.collection('settings').doc('phones').set({ phoneNumbers, whatsappMainNumber: whatsappMain });
}

async function saveTexts() {
    if (!db) return;
    const texts = {
        siteTitle: document.getElementById('siteTitle').value,
        siteDesc: document.getElementById('siteDesc').value,
        sectionTitle: document.getElementById('sectionTitle').value,
        sectionSubtitle: document.getElementById('sectionSubtitle').value,

        whatsappBtnText: document.getElementById('whatsappBtnText').value,

function renderVillasList() {
    const tbody = document.getElementById('villasList');
    if (!tbody) return;
    
    tbody.innerHTML = properties.map(villa => {
        const isBooked = bookings.some(b => b.villaId === villa.id);
        const booking = bookings.find(b => b.villaId === villa.id);
        return `
            <tr data-id="${villa.id}">
                <td style="color:#D4AF37;">${villa.number}</td>
                <td><input type="text" class="location-input" value="${villa.location || ''}" style="width:180px;"></td>
                <td><input type="text" class="locname-input" value="${villa.locationName || ''}" style="width:120px;"></td>
                <td><input type="number" class="price-input" value="${villa.price}" step="1000" style="width:100px;"></td>
                <td><input type="number" class="beds-input" value="${villa.bedrooms}" style="width:60px;"></td>
                <td><input type="number" class="baths-input" value="${villa.bathrooms}" style="width:60px;"></td>
                <td><input type="number" class="guests-input" value="${villa.guests}" style="width:60px;"></td>
                <td style="color:${isBooked ? '#ef4444' : '#22c55e'};">${isBooked ? 'محجوزة' : 'متاحة'}</td>
                <td>${isBooked ? `<button class="btn-cancel" onclick="cancelBookingForVilla(${villa.id})">إلغاء</button>` : `<button class="btn-book" onclick="bookVilla(${villa.id})">حجز</button>`}</td>
                <td><label class="toggle-switch"><input type="checkbox" class="visible-check" ${villa.visible !== false ? 'checked' : ''}><span class="toggle-slider"></span></label></td>
                <td><button class="btn-danger" onclick="deleteVilla(${villa.id})">🗑️ حذف</button></td>
            </tr>
        `;
    }).join('');
}

function renderBookingsList() {
    const container = document.getElementById('bookingsList');
    if (!container) return;
    if (bookings.length === 0) { container.innerHTML = '<p>لا توجد حجوزات</p>'; return; }
    container.innerHTML = bookings.map(b => `
        <div class="booking-item">
            <span><strong style="color:#D4AF37;">${b.villaNumber}</strong> - ${b.date} ${b.time || ''}</span>
            <button class="btn-danger" onclick="cancelBooking(${b.id})">إلغاء</button>
        </div>
    `).join('');
}

function renderPhonesList() {
    const container = document.getElementById('phonesList');

    container.innerHTML = phoneNumbers.map((p, i) => `
        <div class="phone-item">
            <input type="text" value="${p}" onchange="updatePhone(${i}, this.value)">

function renderHeroImagesList() {

function renderSpeedsList() {

// ==================== Actions ====================
async function saveAllVillas() {
    const rows = document.querySelectorAll('#villasList tr');
    rows.forEach(row => {
        const id = parseInt(row.dataset.id);
        const villa = properties.find(p => p.id === id);
        if (villa) {
            villa.location = row.querySelector('.location-input')?.value || villa.location;
            villa.locationName = row.querySelector('.locname-input')?.value || villa.locationName;
            villa.price = parseInt(row.querySelector('.price-input')?.value) || villa.price;
            villa.priceDisplay = villa.price.toLocaleString();
            villa.bedrooms = parseInt(row.querySelector('.beds-input')?.value) || villa.bedrooms;
            villa.bathrooms = parseInt(row.querySelector('.baths-input')?.value) || villa.bathrooms;
            villa.guests = parseInt(row.querySelector('.guests-input')?.value) || villa.guests;
            villa.visible = row.querySelector('.visible-check')?.checked || false;
        }
    });
    await saveProperties();
    renderVillasList();
    updateStats();
    showToast('✅ تم حفظ التغييرات');
}

async function deleteVilla(id) {
    if (confirm('هل أنت متأكد من حذف هذه الفيلا؟')) {
        if (imageIntervals[id]) clearInterval(imageIntervals[id]);
        properties = properties.filter(p => p.id !== id);
        await saveProperties();
        renderVillasList();
        renderSpeedsList();
        updateStats();
        updateVillaImagesInfo();
        showToast('✅ تم حذف الفيلا');
    }
}

async function bookVilla(id) {
    if (bookings.some(b => b.villaId === id)) { showToast('❌ الفيلا محجوزة'); return; }
    const villa = properties.find(p => p.id === id);
    bookings.push({ id: Date.now(), villaId: id, villaNumber: villa.number, date: new Date().toLocaleDateString('ar-IQ'), time: new Date().toLocaleTimeString('ar-IQ') });
    await saveBookings();
    renderVillasList();
    renderBookingsList();
    updateStats();
    showToast(`✅ تم حجز ${villa.number}`);
}

async function cancelBooking(bookingId) {
    bookings = bookings.filter(b => b.id !== bookingId);
    await saveBookings();
    renderVillasList();
    renderBookingsList();
    updateStats();
    showToast('✅ تم إلغاء الحجز');
}

async function cancelBookingForVilla(villaId) {
    const booking = bookings.find(b => b.villaId === villaId);
    if (booking) {
        bookings = bookings.filter(b => b.id !== booking.id);
        await saveBookings();
        renderVillasList();
        renderBookingsList();
        updateStats();
        showToast('✅ تم إلغاء الحجز');
    }
}

async function deleteAllBookings() {
    if (confirm('هل أنت متأكد من حذف جميع الحجوزات؟')) {
        bookings = [];
        await saveBookings();
        renderVillasList();
        renderBookingsList();
        updateStats();
        showToast('✅ تم حذف جميع الحجوزات');
    }
}

// Add Villa
function handleImageUpload(event) {
    const files = Array.from(event.target.files);
    const preview = document.getElementById('imagePreview');
    for (let file of files) {
        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = function(e) {
                tempImages.push(e.target.result);
                const div = document.createElement('div');
                div.className = 'image-preview';
                div.innerHTML = `<img src="${e.target.result}"><span class="remove-img" onclick="this.parentElement.remove(); tempImages=tempImages.filter(img=>img!=='${e.target.result}')">&times;</span>`;
                preview.appendChild(div);
            };
            reader.readAsDataURL(file);
        }
    }
}

        visible: true,
        slideshowSpeed: 4,

function changeGlobalSpeedMode() {

function applyAllSpeedSettings() {

        properties.forEach(v => v.slideshowSpeed = speed);
        showToast(`✅ تم تطبيق سرعة موحدة (${speed} ثانية)`);
    } else if (globalSpeedMode === 'alternating') {
        properties.forEach((v, idx) => { v.slideshowSpeed = idx % 2 === 0 ? 4 : 5.5; });
        showToast(`✅ تم تطبيق سرعة متناوبة (فردي: 4 ث، زوجي: 5.5 ث)`);

            if (input) v.slideshowSpeed = parseFloat(input.value);
        });
        showToast(`✅ تم تطبيق السرعات المحددة`);

    renderSpeedsList();
}

    document.getElementById('slideshowMode').value = mode;
    saveAppearance();
    showToast('✅ تم حفظ الإعدادات العامة');
}

function resetGeneralSettings() {
    document.getElementById('generalHeroSpeed').value = '6';
    document.getElementById('generalSlideshowMode').value = 'sequential';
    saveGeneralSettings();
    showToast('✅ تم استرجاع الإعدادات');
}

// Tab Navigation
function showTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`${tabName}Tab`).classList.add('active');
    document.querySelector(`.tab-btn[data-tab="${tabName}"]`).classList.add('active');
    if (tabName === 'images') renderHeroImagesList();
    if (tabName === 'bookings') renderBookingsList();
    if (tabName === 'villaImages') {
        renderSpeedsList();
        changeGlobalSpeedMode();
        updateVillaImagesInfo();
    }
    if (tabName === 'phones') renderPhonesList();
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

// ==================== Event Listeners ====================
document.getElementById('saveVillasBtn').onclick = saveAllVillas;
document.getElementById('addVillaBtn').onclick = addVilla;
document.getElementById('clearAddFormBtn').onclick = clearAddForm;
document.getElementById('saveAppearanceBtn').onclick = saveAppearance;
document.getElementById('resetAppearanceBtn').onclick = resetAppearance;
document.getElementById('addHeroImageBtn').onclick = addHeroImageByUrl;
document.getElementById('restartSlideshowBtn').onclick = restartHeroSlideshow;
document.getElementById('resetHeroImagesBtn').onclick = resetHeroImages;
document.getElementById('applySpeedBtn').onclick = applyAllSpeedSettings;
document.getElementById('restartIntervalBtn').onclick = restartAllVillaIntervals;
document.getElementById('stopIntervalBtn').onclick = stopAllVillaIntervals;
document.getElementById('randomizeImagesBtn').onclick = randomizeAllVillaImages;
document.getElementById('saveSpeedSettingsBtn').onclick = saveVillaSpeedSettings;
document.getElementById('resetSpeedSettingsBtn').onclick = resetVillaSpeedSettings;
document.getElementById('saveTextsBtn').onclick = saveTexts;
document.getElementById('resetTextsBtn').onclick = resetTexts;
document.getElementById('addPhoneBtn').onclick = addPhone;
document.getElementById('savePhonesBtn').onclick = savePhones;
document.getElementById('resetPhonesBtn').onclick = resetPhones;
document.getElementById('saveGeneralSettingsBtn').onclick = saveGeneralSettings;
document.getElementById('resetGeneralSettingsBtn').onclick = resetGeneralSettings;
document.getElementById('clearBookingsBtn').onclick = deleteAllBookings;
document.getElementById('globalSpeedMode').onchange = changeGlobalSpeedMode;

// Tab click listeners
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => showTab(btn.dataset.tab));
});

// ==================== Start ====================
loadData();
</script>
